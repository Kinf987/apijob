<title>Carte de visite API JOB v2</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #E8E4DC;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 60px 20px;
    font-family: 'DM Sans', sans-serif;
  }

  .section-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #999;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ───────────────────────────────────
     FORMAT RÉEL 85×55mm
     À 96dpi : 85mm = 322px, 55mm = 208px
     On monte à 2× pour la netteté écran
     → 644 × 416px  mais on affiche 400×260 pour l'aperçu
  ─────────────────────────────────── */

  .card {
    width: 400px;
    height: 252px;
    position: relative;
    overflow: hidden;
  }

  /* ═══════════════════════
     RECTO
  ═══════════════════════ */
  .recto {
    background: #F5F0E8;
    box-shadow:
      0 2px 0 0 #E0D8CC,
      0 20px 60px rgba(0,0,0,0.14),
      0 4px 12px rgba(0,0,0,0.08);
  }

  /* Accent lagon en haut */
  .recto .top-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #CC0A2B 0%, #1E9AC8 50%, #F0C040 100%);
  }

  /* Vague décorative SVG en fond */
  .recto .wave-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    opacity: 0.07;
  }

  /* Cercle déco lagon */
  .recto .circle-deco {
    position: absolute;
    bottom: -70px; right: -70px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: #1E9AC8;
    opacity: 0.08;
  }
  .recto .circle-deco2 {
    position: absolute;
    top: -50px; left: -50px;
    width: 150px; height: 150px;
    border-radius: 50%;
    background: #F0C040;
    opacity: 0.07;
  }

  .recto-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 32px 24px;
    gap: 0;
  }

  /* Logo complet */
  .logo-block {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .logo-txt-r .api-r {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: #CC0A2B;
    line-height: 1;
    letter-spacing: -1.5px;
  }
  .logo-txt-r .job-r {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: #1A1A1A;
    line-height: 1;
    letter-spacing: -1.5px;
  }

  /* Ligne or sous le logo */
  .gold-rule {
    width: 48px;
    height: 3px;
    background: #F0C040;
    border-radius: 2px;
    margin: 0 auto 14px;
  }

  /* Slogan */
  .slogan-r {
    font-size: 10px;
    color: #1E9AC8;
    letter-spacing: 1px;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.5;
  }

  /* Domaines en bas */
  .domains {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  .domain-pill {
    background: rgba(30,154,200,0.1);
    color: #1E9AC8;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  /* ═══════════════════════
     VERSO
  ═══════════════════════ */
  .verso {
    background: #1E9AC8;
    box-shadow:
      0 2px 0 0 #167EA4,
      0 20px 60px rgba(0,0,0,0.18),
      0 4px 12px rgba(0,0,0,0.1);
  }

  /* Demi-cercle déco haut gauche */
  .verso .deco-arc {
    position: absolute;
    top: -60px; left: -60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .verso .deco-arc2 {
    position: absolute;
    bottom: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  /* Barre latérale or gauche */
  .verso .side-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: #F0C040;
  }

  /* Barre rouge en bas */
  .verso .bot-stripe {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #CC0A2B;
  }

  .verso-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px 20px 34px;
    gap: 0;
  }

  /* Message fort */
  .message-fort {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: white;
    text-align: center;
    line-height: 1.25;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .message-fort .highlight {
    color: #F0C040;
  }

  .message-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 18px;
  }

  /* QR */
  .qr-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .qr-border {
    background: white;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .qr-border img {
    width: 84px;
    height: 84px;
    display: block;
  }

  /* Bottom info */
  .verso-bottom {
    position: absolute;
    bottom: 14px;
    left: 34px; right: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .verso-url {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: white;
  }

  .verso-local {
    font-size: 8px;
    color: rgba(255,255,255,0.5);
    text-align: right;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  .verso-local .heart { color: #CC0A2B; }
  .verso-local strong {
    color: #F0C040;
    font-weight: 600;
    display: block;
    font-size: 8px;
  }

  .scan-label {
    font-size: 8px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    font-weight: 500;
  }
</style>
</head>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Page introuvable</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--gris); color:var(--night);
    min-height:100vh; display:flex; flex-direction:column;
  }

  nav {
    background:var(--blanc); border-bottom:2px solid var(--rouge);
    padding:1rem 5%;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-logo {
    font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800;
    color:var(--rouge); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.25rem; cursor:default;
  }
  .nav-logo span { color:var(--or); }

  main {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:2rem 1.5rem;
  }

  .page {
    width:100%; max-width:440px; text-align:center;
    animation:fadeUp 0.5s ease both;
  }

  .code-404 {
    font-family:'Syne',sans-serif; font-size:6rem; font-weight:800;
    color:var(--rouge); line-height:1; margin-bottom:0.5rem;
    opacity:0.12; letter-spacing:-4px;
  }

  .icon {
    font-size:4rem; display:block; margin:-2rem auto 1.5rem;
    animation:pop 0.5s ease 0.1s both;
  }

  h1 {
    font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
    letter-spacing:-0.5px; margin-bottom:0.6rem;
  }
  h1 span { color:var(--rouge); }

  .sub {
    font-size:0.92rem; color:var(--muted); line-height:1.6;
    margin-bottom:2rem;
  }

  .actions {
    display:flex; flex-direction:column; gap:0.75rem;
  }

  .btn-primary {
    padding:0.9rem 1.5rem;
    background:var(--rouge); color:white; border:none;
    border-radius:14px; font-family:'DM Sans',sans-serif;
    font-size:0.95rem; font-weight:700; cursor:pointer;
    transition:all 0.2s; text-decoration:none;
    display:flex; align-items:center; justify-content:center; gap:0.5rem;
  }
  .btn-primary:hover { background:var(--rouge-dark); transform:translateY(-1px); box-shadow:0 6px 20px rgba(204,10,43,0.3); }

  .btn-secondary {
    padding:0.9rem 1.5rem;
    background:var(--blanc); color:var(--night); border:1.5px solid var(--gris2);
    border-radius:14px; font-family:'DM Sans',sans-serif;
    font-size:0.95rem; font-weight:600; cursor:pointer;
    transition:all 0.2s; text-decoration:none;
    display:flex; align-items:center; justify-content:center; gap:0.5rem;
  }
  .btn-secondary:hover { border-color:var(--rouge); color:var(--rouge); }

  .links {
    margin-top:2rem;
    display:flex; justify-content:center; gap:1.5rem;
    flex-wrap:wrap;
  }
  .links a {
    font-size:0.82rem; color:var(--muted); text-decoration:none;
    transition:color 0.15s;
  }
  .links a:hover { color:var(--rouge); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes pop {
    0% { transform:scale(0.5); opacity:0; }
    80% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
  }
</style>
</head>
<body>

<nav>
  <a href="apijob-v4.html" class="nav-logo" style="text-decoration:none;">API<span>JOB</span></a>
</nav>

<main>
  <div class="page">
    <div class="code-404">404</div>
    <span class="icon">🌊</span>
    <h1>Page <span>introuvable</span></h1>
    <p class="sub">Cette page n'existe pas ou a été déplacée.<br>Pas de panique — retournez au bon endroit.</p>

    <div class="actions">
      <a href="apijob-v4.html" class="btn-primary">🏠 Retour à l'accueil</a>
      <a href="apijob-annonces.html" class="btn-secondary">🔍 Voir les annonces</a>
    </div>

    <div class="links">
      <a href="apijob-pro.html">Annuaire des pros</a>
      <a href="apijob-annonce.html">Publier une annonce</a>
      <a href="apijob-contact.html">Nous contacter</a>
    </div>
  </div>
</main>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
    --vert: #1A7A4A;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--gris); color:var(--night); }

  nav {
    position:sticky; top:0; z-index:100;
    background:var(--blanc); border-bottom:2px solid var(--rouge);
    padding:0.9rem 5%;
    display:flex; align-items:center; justify-content:space-between;
  }
  .nav-logo {
    font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
    color:var(--rouge); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.25rem; text-decoration:none;
  }
  .nav-logo span { color:var(--or); }
  .nav-back { font-size:0.88rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--rouge); }

  /* HERO */
  .hero {
    background:var(--night); padding:3rem 5%;
    text-align:center; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-80px; right:-80px;
    width:300px; height:300px; border-radius:50%;
    background:rgba(204,10,43,0.08); pointer-events:none;
  }
  .hero h1 {
    font-family:'Syne',sans-serif;
    font-size:clamp(1.8rem,4vw,2.5rem); font-weight:800;
    letter-spacing:-1px; color:var(--blanc); margin-bottom:0.8rem;
    position:relative; z-index:1;
  }
  .hero h1 span { color:var(--or); }
  .hero-sub {
    font-size:0.92rem; color:rgba(255,255,255,0.45);
    max-width:480px; margin:0 auto; line-height:1.6;
    position:relative; z-index:1;
  }

  .page { max-width:900px; margin:0 auto; padding:2.5rem 5%; }

  /* GRID */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2.5rem; }

  /* CONTACT CARD */
  .contact-card {
    background:var(--blanc); border-radius:20px;
    border:1px solid var(--border); padding:1.8rem;
    transition:all 0.2s;
  }
  .contact-card:hover { border-color:var(--rouge); transform:translateY(-2px); box-shadow:0 8px 24px rgba(204,10,43,0.08); }
  .contact-icon { font-size:2rem; margin-bottom:0.8rem; }
  .contact-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; margin-bottom:0.4rem; }
  .contact-desc { font-size:0.85rem; color:var(--muted); line-height:1.6; margin-bottom:1rem; }
  .contact-link {
    display:inline-flex; align-items:center; gap:0.4rem;
    color:var(--rouge); font-weight:600; font-size:0.85rem;
    text-decoration:none; transition:opacity 0.2s;
  }
  .contact-link:hover { opacity:0.7; }

  /* FORMULAIRE */
  .form-card {
    background:var(--blanc); border-radius:20px;
    border:1px solid var(--border); padding:2rem;
    margin-bottom:2.5rem;
  }
  .form-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:0.4rem; }
  .form-sub { font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem; }
  .form-group { margin-bottom:1rem; }
  .form-label { display:block; font-size:0.78rem; font-weight:600; color:var(--night); margin-bottom:0.4rem; }
  .form-input, .form-select, .form-textarea {
    width:100%; padding:0.8rem 1rem;
    border:1.5px solid var(--border); border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--night);
    background:var(--blanc); outline:none; transition:border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color:var(--rouge); box-shadow:0 0 0 3px rgba(204,10,43,0.08);
  }
  .form-input::placeholder, .form-textarea::placeholder { color:rgba(26,0,8,0.3); }
  .form-textarea { resize:vertical; min-height:120px; line-height:1.6; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
  .btn-envoyer {
    background:var(--rouge); color:white; border:none;
    padding:0.9rem 2rem; border-radius:50px;
    font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:700;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-envoyer:hover { background:var(--rouge-dark); transform:translateY(-1px); box-shadow:0 6px 20px rgba(204,10,43,0.3); }

  /* SUCCESS */
  .form-success {
    background:rgba(26,122,74,0.06); border:1.5px solid rgba(26,122,74,0.2);
    border-radius:12px; padding:1.2rem; text-align:center;
    display:none; margin-top:1rem;
  }
  .form-success.show { display:block; }
  .form-success p { font-size:0.88rem; color:var(--vert); font-weight:500; }

  /* FAQ */
  .faq-section { margin-bottom:2.5rem; }
  .section-label {
    font-size:0.72rem; font-weight:700; letter-spacing:3px;
    text-transform:uppercase; color:var(--rouge); margin-bottom:0.7rem;
  }
  .section-title {
    font-family:'Syne',sans-serif; font-size:clamp(1.5rem,2.5vw,2rem);
    font-weight:800; letter-spacing:-0.5px; margin-bottom:0.5rem;
  }
  .section-sub { font-size:0.9rem; color:var(--muted); margin-bottom:2rem; }

  /* FILTRES FAQ */
  .faq-filtres { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
  .faq-filtre {
    padding:0.4rem 1rem; border-radius:50px;
    border:1.5px solid var(--border);
    background:var(--blanc); color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:500;
    cursor:pointer; transition:all 0.2s;
  }
  .faq-filtre:hover { border-color:var(--rouge); color:var(--rouge); }
  .faq-filtre.active { background:var(--rouge); color:white; border-color:var(--rouge); }

  /* FAQ ITEMS */
  .faq-list { max-width:100%; }
  .faq-item {
    border-bottom:1px solid rgba(204,10,43,0.08);
    overflow:hidden;
  }
  .faq-item:last-child { border-bottom:none; }
  .faq-question {
    display:flex; justify-content:space-between; align-items:center;
    padding:1.1rem 0; cursor:pointer; gap:1rem;
    font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700;
    color:var(--night); transition:color 0.2s;
    user-select:none;
  }
  .faq-question:hover { color:var(--rouge); }
  .faq-icon {
    font-size:1.1rem; color:var(--rouge);
    transition:transform 0.3s; flex-shrink:0; font-style:normal;
  }
  .faq-item.open .faq-icon { transform:rotate(45deg); }
  .faq-answer {
    font-size:0.88rem; color:var(--muted);
    line-height:1.75; max-height:0; overflow:hidden;
    transition:max-height 0.35s ease, padding 0.3s ease;
  }
  .faq-item.open .faq-answer { max-height:300px; padding-bottom:1.1rem; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .page { animation:fadeUp 0.4s ease both; }

  @media (max-width:640px) {
    .grid-2 { grid-template-columns:1fr; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="apijob-v4.html" class="nav-logo" style="text-decoration:none;">
    <svg width="24" height="24" viewBox="0 0 28 28" style="border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="c"><circle cx="14" cy="14" r="14"/></clipPath></defs><g clip-path="url(#c)"><circle cx="14" cy="14" r="14" fill="white"/><g stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><line x1="14" y1="17" x2="2.2" y2="14.9"/><line x1="14" y1="17" x2="3.4" y2="11.4"/><line x1="14" y1="17" x2="5.7" y2="8.4"/><line x1="14" y1="17" x2="8.5" y2="6.3"/><line x1="14" y1="17" x2="12.1" y2="5.2"/><line x1="14" y1="17" x2="15.9" y2="5.2"/><line x1="14" y1="17" x2="19.5" y2="6.3"/><line x1="14" y1="17" x2="22.3" y2="8.4"/><line x1="14" y1="17" x2="24.6" y2="11.4"/><line x1="14" y1="17" x2="25.8" y2="14.9"/></g><rect x="0" y="17" width="28" height="11" fill="#1E7FC2"/><path d="M7,17.5 Q14,15.5 21,17.5 L20.5,18.5 Q14,16.8 7.5,18.5 Z" fill="#CE1126"/><path d="M3,19.5 Q7,18.5 11,19.5 Q14,20.5 17,19.5 Q21,18.5 25,19.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.8"/><path d="M3,21.5 Q7,20.5 11,21.5 Q14,22.5 17,21.5 Q21,20.5 25,21.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/><path d="M3,23.5 Q7,22.5 11,23.5 Q14,24.5 17,23.5 Q21,22.5 25,23.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.4"/></g></svg>
    API<span>JOB</span>
  </a>
  <a href="apijob-v4.html" class="nav-back">← Accueil</a>
</nav>

<div class="hero">
  <h1><span>Contact</span></h1>
  <p class="hero-sub">Une question ? On est là.</p>
</div>

<div class="page">

  <!-- FORMULAIRE -->
  <div class="form-card">
    <div class="form-title">✉️ Nous envoyer un message</div>
    <div class="form-sub">Remplissez ce formulaire et nous vous répondrons dans les plus brefs délais.</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom et nom</label>
        <input type="text" class="form-input" placeholder="Votre nom">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="votre@email.pf">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Sujet</label>
      <select class="form-select">
        <option value="">Choisir un sujet</option>
        <option>Question sur les jetons</option>
        <option>Problème avec mon compte</option>
        <option>Signalement d'un utilisateur</option>
        <option>Demande de partenariat</option>
        <option>Bug ou problème technique</option>
        <option>Autre</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Êtes-vous déjà membre du site ?</label>
      <div style="display:flex; gap:1rem; margin-top:0.3rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.88rem;">
          <input type="radio" name="membre" value="oui" style="accent-color:var(--rouge);"> Oui, j'ai un compte
        </label>
        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.88rem;">
          <input type="radio" name="membre" value="non" style="accent-color:var(--rouge);"> Non, je n'ai pas de compte
        </label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-textarea" placeholder="Décrivez votre question ou problème en détail..."></textarea>
    </div>

    <button class="btn-envoyer" onclick="envoyerMessage()">📩 Envoyer le message</button>

    <div class="form-success" id="form-success">
      <p>✅ Message envoyé ! Nous vous répondrons à l'adresse indiquée sous 24-48h. Merci 🌺</p>
    </div>
  </div>


</div>

<script>
  function toggleFaq(el) {
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
  }

  function filtrerFaq(btn, cat) {
    document.querySelectorAll('.faq-filtre').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.faq-item').forEach(item => {
      item.style.display = (cat === 'tous' || item.dataset.cat === cat) ? 'block' : 'none';
    });
  }

  function envoyerMessage() {
    document.getElementById('form-success').classList.add('show');
    window.scrollTo({ top: document.getElementById('form-success').offsetTop - 100, behavior:'smooth' });
  }
</script>

</body>
</html>

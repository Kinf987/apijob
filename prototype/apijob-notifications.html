<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html { visibility: hidden; }
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
    --vert: #1A7A4A;
    --vert-light: rgba(26,122,74,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--gris); color:var(--night); min-height:100vh; }

  nav {
    position:sticky; top:0; z-index:100;
    background:var(--blanc); border-bottom:2px solid var(--rouge);
    padding:0.9rem 5%;
    display:flex; align-items:center; justify-content:space-between;
  }
  .nav-logo {
    font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
    color:var(--rouge); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.25rem; text-decoration:none;
  }
  .nav-logo span { color:var(--or); }
  .nav-right { display:flex; align-items:center; gap:1rem; }
  .nav-back { font-size:0.88rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--rouge); }
  .btn-tout-lu {
    font-size:0.82rem; color:var(--rouge); background:none;
    border:none; cursor:pointer; font-family:'DM Sans',sans-serif;
    font-weight:600; text-decoration:underline;
  }

  .page { max-width:680px; margin:0 auto; padding:2rem 5%; }

  .page-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;
  }
  .page-title {
    font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
    letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.6rem;
  }
  .notif-count {
    background:var(--rouge); color:white;
    font-size:0.75rem; font-weight:700;
    padding:0.15rem 0.6rem; border-radius:50px;
  }

  /* FILTRES */
  .filtres {
    display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap;
  }
  .filtre-btn {
    padding:0.45rem 1rem; border-radius:50px;
    border:1.5px solid var(--border);
    background:var(--blanc); color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500;
    cursor:pointer; transition:all 0.2s;
  }
  .filtre-btn:hover { border-color:var(--rouge); color:var(--rouge); }
  .filtre-btn.active { background:var(--rouge); color:white; border-color:var(--rouge); }

  /* GROUPE */
  .notif-groupe { margin-bottom:1.5rem; }
  .notif-groupe-label {
    font-size:0.72rem; font-weight:700; text-transform:uppercase;
    letter-spacing:2px; color:var(--muted); margin-bottom:0.8rem;
    padding-left:0.2rem;
  }

  /* NOTIF CARD */
  .notif-card {
    background:var(--blanc); border-radius:16px;
    border:1.5px solid var(--border);
    padding:1rem 1.2rem;
    display:flex; align-items:flex-start; gap:1rem;
    margin-bottom:0.6rem; transition:all 0.2s; cursor:pointer;
    position:relative;
  }
  .notif-card:hover { border-color:var(--rouge); transform:translateX(3px); }
  .notif-card.unread { background:rgba(204,10,43,0.03); border-color:rgba(204,10,43,0.2); }
  .notif-card.unread::before {
    content:''; position:absolute; left:-1px; top:50%;
    transform:translateY(-50%);
    width:4px; height:60%; background:var(--rouge);
    border-radius:0 4px 4px 0;
  }

  .notif-icon-wrap {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; flex-shrink:0;
  }
  .icon-mission { background:var(--vert-light); }
  .icon-jeton { background:rgba(240,165,0,0.12); }
  .icon-avis { background:rgba(240,165,0,0.12); }
  .icon-systeme { background:rgba(204,10,43,0.07); }
  .icon-message { background:rgba(0,107,143,0.08); }

  .notif-content { flex:1; min-width:0; }
  .notif-title { font-size:0.88rem; font-weight:600; margin-bottom:0.2rem; line-height:1.4; }
  .notif-card.unread .notif-title { font-weight:700; color:var(--night); }
  .notif-desc { font-size:0.78rem; color:var(--muted); line-height:1.5; margin-bottom:0.3rem; }
  .notif-time { font-size:0.7rem; color:rgba(26,0,8,0.3); }

  .notif-actions { display:flex; gap:0.5rem; margin-top:0.6rem; }
  .btn-notif {
    padding:0.4rem 0.9rem; border-radius:50px;
    font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; border:none;
  }
  .btn-notif-primary { background:var(--rouge); color:white; }
  .btn-notif-primary:hover { background:var(--rouge-dark); }
  .btn-notif-secondary {
    background:transparent; color:var(--muted);
    border:1.5px solid var(--border);
  }
  .btn-notif-secondary:hover { border-color:var(--muted); color:var(--night); }

  .unread-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--rouge); flex-shrink:0; margin-top:6px;
  }

  /* EMPTY */
  .empty-state {
    text-align:center; padding:4rem 2rem; display:none;
  }
  .empty-icon { font-size:3rem; margin-bottom:1rem; }
  .empty-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:0.5rem; }
  .empty-sub { font-size:0.85rem; color:var(--muted); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .notif-card { animation:fadeUp 0.3s ease both; }
</style>
</head>
<body>

<nav>
  <a href="apijob-v4.html" class="nav-logo" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 28 28" style="border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="c"><circle cx="14" cy="14" r="14"/></clipPath></defs><g clip-path="url(#c)"><circle cx="14" cy="14" r="14" fill="white"/><g stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><line x1="14" y1="17" x2="2.2" y2="14.9"/><line x1="14" y1="17" x2="3.4" y2="11.4"/><line x1="14" y1="17" x2="5.7" y2="8.4"/><line x1="14" y1="17" x2="8.5" y2="6.3"/><line x1="14" y1="17" x2="12.1" y2="5.2"/><line x1="14" y1="17" x2="15.9" y2="5.2"/><line x1="14" y1="17" x2="19.5" y2="6.3"/><line x1="14" y1="17" x2="22.3" y2="8.4"/><line x1="14" y1="17" x2="24.6" y2="11.4"/><line x1="14" y1="17" x2="25.8" y2="14.9"/></g><rect x="0" y="17" width="28" height="11" fill="#1E7FC2"/><path d="M7,17.5 Q14,15.5 21,17.5 L20.5,18.5 Q14,16.8 7.5,18.5 Z" fill="#CE1126"/><path d="M3,19.5 Q7,18.5 11,19.5 Q14,20.5 17,19.5 Q21,18.5 25,19.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.8"/><path d="M3,21.5 Q7,20.5 11,21.5 Q14,22.5 17,21.5 Q21,20.5 25,21.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/><path d="M3,23.5 Q7,22.5 11,23.5 Q14,24.5 17,23.5 Q21,22.5 25,23.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.4"/></g></svg> API<span>JOB</span></a>
  <div class="nav-right">
    <a href="apijob-dashboard.html" class="nav-back">← Tableau de bord</a>
    <button class="btn-tout-lu" onclick="toutMarquerLu()">Tout marquer lu</button>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">
      🔔 Notifications
      <span class="notif-count" id="notif-count" style="display:none;">0</span>
    </div>
  </div>

  <div class="filtres">
    <button class="filtre-btn active" onclick="filtrer(this,'tous')">Toutes</button>
    <button class="filtre-btn" onclick="filtrer(this,'mission')">📋 Missions</button>
    <button class="filtre-btn" onclick="filtrer(this,'message')">💬 Messages</button>
    <button class="filtre-btn" onclick="filtrer(this,'jeton')">🪙 Jetons</button>
    <button class="filtre-btn" onclick="filtrer(this,'avis')">⭐ Avis</button>
  </div>


  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🔔</div>
    <div class="empty-title">Aucune notification</div>
    <div class="empty-sub">Vous n'avez pas encore de notifications dans cette catégorie.</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  let currentUser = null;
  let allNotifs   = [];

  function escHTML(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  // ── FILTRER ──
  function filtrer(btn, type) {
    document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let visible = 0;
    document.querySelectorAll('.notif-card').forEach(card => {
      const show = type === 'tous' || card.dataset.type === type;
      card.style.display = show ? 'flex' : 'none';
      if (show) visible++;
    });
    // Masquer les groupes vides
    document.querySelectorAll('.notif-groupe').forEach(g => {
      g.style.display = Array.from(g.querySelectorAll('.notif-card')).some(c => c.style.display !== 'none') ? '' : 'none';
    });
    document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
  }

  // ── TOUT MARQUER LU ──
  async function toutMarquerLu() {
    if (!currentUser) return;
    await db.from('notifications').update({ lu: true }).eq('user_id', currentUser.id).eq('lu', false);
    document.querySelectorAll('.notif-card.unread').forEach(card => {
      card.classList.remove('unread');
      card.querySelector('.unread-dot')?.remove();
    });
    const el = document.getElementById('notif-count');
    el.textContent = '0';
    el.style.display = 'none';
  }

  // ── MARQUER UNE NOTIF LUE ──
  async function marquerLu(id, card) {
    if (!card.classList.contains('unread')) return;
    card.classList.remove('unread');
    card.querySelector('.unread-dot')?.remove();
    await db.from('notifications').update({ lu: true }).eq('id', id);
    const count = document.querySelectorAll('.notif-card.unread').length;
    const el = document.getElementById('notif-count');
    el.textContent = count;
    el.style.display = count > 0 ? '' : 'none';
  }

  // ── HELPERS TYPE ──
  function typeInfo(type) {
    if (!type) return { icon:'🌺', cls:'icon-systeme', cat:'systeme' };
    if (type.startsWith('mission') || type.startsWith('annonce') || type.startsWith('proposition'))
      return { icon:'📋', cls:'icon-mission', cat:'mission' };
    if (type.startsWith('message'))  return { icon:'💬', cls:'icon-message', cat:'message' };
    if (type.startsWith('jeton') || type.startsWith('token') || type.startsWith('transaction'))
      return { icon:'🪙', cls:'icon-jeton', cat:'jeton' };
    if (type.startsWith('avis') || type.startsWith('eval'))
      return { icon:'⭐', cls:'icon-avis', cat:'avis' };
    return { icon:'🌺', cls:'icon-systeme', cat:'systeme' };
  }

  // ── BUILD CARD ──
  function buildCard(notif) {
    const { icon, cls, cat } = typeInfo(notif.type);
    const unread = !notif.lu;
    const timeStr = formatDate(notif.created_at);

    const actionLabels = { message:'Répondre', avis:'Voir et répondre', mission:'Voir', jeton:'OK', systeme:'Compléter mon profil' };
    const actionLabel = actionLabels[cat] || 'Voir';
    const action = notif.lien
      ? `<div class="notif-actions"><button class="btn-notif btn-notif-primary" onclick="event.stopPropagation();location.href='${notif.lien}'">${actionLabel}</button></div>`
      : '';

    const card = document.createElement('div');
    card.className = `notif-card${unread ? ' unread' : ''}`;
    card.dataset.type = cat;
    card.innerHTML = `
      <div class="notif-icon-wrap ${cls}">${icon}</div>
      <div class="notif-content">
        <div class="notif-title">${escHTML(notif.titre)}</div>
        <div class="notif-desc">${escHTML(notif.message)}</div>
        <div class="notif-time">${timeStr}</div>
        ${action}
      </div>
      ${unread ? '<div class="unread-dot"></div>' : ''}`;
    card.onclick = () => marquerLu(notif.id, card);
    return card;
  }

  // ── GROUPER PAR DATE ──
  function groupByDate(notifs) {
    const now  = new Date();
    const d0   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const d1   = new Date(d0 - 86400000);
    const d7   = new Date(d0 - 7 * 86400000);
    const grps = [
      { label:"Aujourd'hui", items:[] },
      { label:"Hier",        items:[] },
      { label:"Cette semaine", items:[] },
      { label:"Plus ancien", items:[] }
    ];
    notifs.forEach(n => {
      const d = new Date(new Date(n.created_at).getFullYear(), new Date(n.created_at).getMonth(), new Date(n.created_at).getDate());
      if (d >= d0)      grps[0].items.push(n);
      else if (d >= d1) grps[1].items.push(n);
      else if (d >= d7) grps[2].items.push(n);
      else              grps[3].items.push(n);
    });
    return grps;
  }

  // ── RENDER ──
  function renderAll(notifs) {
    // Supprimer anciens groupes
    document.querySelectorAll('.notif-groupe').forEach(g => g.remove());

    const page  = document.querySelector('.page');
    const empty = document.getElementById('empty-state');
    const grps  = groupByDate(notifs);
    let anyItem = false;

    grps.forEach(({ label, items }) => {
      if (!items.length) return;
      anyItem = true;
      const groupe = document.createElement('div');
      groupe.className = 'notif-groupe';
      groupe.innerHTML = `<div class="notif-groupe-label">${label}</div>`;
      items.forEach(n => groupe.appendChild(buildCard(n)));
      page.insertBefore(groupe, empty);
    });

    empty.style.display = anyItem ? 'none' : 'block';

    // Badge
    const unread = notifs.filter(n => !n.lu).length;
    const countEl = document.getElementById('notif-count');
    countEl.textContent = unread;
    countEl.style.display = unread > 0 ? '' : 'none';
  }

  // ── INIT ──
  (async () => {
    currentUser = await requireAuth();
    if (!currentUser) return;

    const { data } = await db.from('notifications')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    allNotifs = data || [];
    renderAll(allNotifs);

    // Realtime : nouvelles notifs
    db.channel('notifs_' + currentUser.id)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'notifications',
        filter: `user_id=eq.${currentUser.id}`
      }, (payload) => {
        allNotifs.unshift(payload.new);
        renderAll(allNotifs);
      })
      .subscribe();
  })().finally(() => { document.documentElement.style.visibility = 'visible'; });
  window.addEventListener('error', () => { document.documentElement.style.visibility = 'visible'; });
  window.addEventListener('unhandledrejection', () => { document.documentElement.style.visibility = 'visible'; });
</script>

</body>
</html>

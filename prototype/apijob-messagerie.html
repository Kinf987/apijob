<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Messagerie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
    --vert: #1A7A4A;
    --vert-light: rgba(26,122,74,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gris);
    color: var(--night);
    display: flex; flex-direction: column;
  }

  /* NAV */
  nav {
    background: var(--blanc);
    border-bottom: 2px solid var(--rouge);
    padding: 0.9rem 5%;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem; font-weight: 800;
    color: var(--rouge); letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 0.25rem;
    text-decoration: none;
  }
  .nav-logo span { color: var(--or); }
  .nav-back {
    font-size: 0.88rem; color: var(--muted);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-back:hover { color: var(--rouge); }

  /* LAYOUT */
  .chat-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 62px);
  }

  /* ── SIDEBAR CONVERSATIONS ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--blanc);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1.2rem 1.2rem 0.8rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 800;
    margin-bottom: 0.8rem;
  }
  .sidebar-search {
    position: relative;
  }
  .sidebar-search input {
    width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.2rem;
    border: 1.5px solid var(--border);
    border-radius: 50px; background: var(--gris);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; color: var(--night);
    outline: none; transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--rouge); background: var(--blanc); }
  .sidebar-search input::placeholder { color: rgba(26,0,8,0.3); }
  .sidebar-search::before {
    content: '🔍';
    position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem; pointer-events: none;
  }

  .conv-list { overflow-y: auto; flex: 1; }

  .conv-item {
    display: flex; align-items: center; gap: 0.9rem;
    padding: 0.9rem 1.2rem;
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid rgba(204,10,43,0.04);
    position: relative;
  }
  .conv-item:hover { background: rgba(204,10,43,0.03); }
  .conv-item.active { background: rgba(204,10,43,0.05); border-right: 3px solid var(--rouge); }
  .conv-item.unread .conv-name { font-weight: 700; }
  .conv-item.unread .conv-last { color: var(--night); }

  .conv-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rouge), #FF4D6A);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 800; color: white;
    flex-shrink: 0; position: relative;
  }
  .conv-avatar.vert { background: linear-gradient(135deg, var(--vert), #2EA86A); }
  .conv-avatar.or { background: linear-gradient(135deg, #B07800, var(--or)); }
  .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--vert); border: 2px solid white;
  }

  .conv-info { flex: 1; min-width: 0; }
  .conv-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.2rem; }
  .conv-name { font-size: 0.88rem; font-weight: 600; }
  .conv-time { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
  .conv-last {
    font-size: 0.78rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-service {
    font-size: 0.7rem; color: var(--rouge);
    font-weight: 500; margin-bottom: 0.15rem;
  }
  .unread-badge {
    background: var(--rouge); color: white;
    font-size: 0.65rem; font-weight: 700;
    min-width: 18px; height: 18px;
    border-radius: 50px; padding: 0 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--gris);
  }

  /* CHAT HEADER */
  .chat-header {
    background: var(--blanc);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    gap: 1rem;
  }
  .chat-header-left { display: flex; align-items: center; gap: 0.9rem; }
  .chat-header-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rouge), #FF4D6A);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem; font-weight: 800; color: white;
    flex-shrink: 0;
  }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 800;
  }
  .chat-header-status { font-size: 0.75rem; color: var(--vert); }
  .chat-header-mission {
    font-size: 0.75rem; color: var(--muted);
    background: var(--gris); border-radius: 50px;
    padding: 0.25rem 0.8rem;
    border: 1px solid var(--border);
  }

  .chat-header-actions { display: flex; gap: 0.6rem; }
  .btn-terminer-chat {
    background: var(--vert-light); color: var(--vert);
    border: 1.5px solid rgba(26,122,74,0.2);
    padding: 0.5rem 1rem; border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-terminer-chat:hover { background: var(--vert); color: white; border-color: var(--vert); }

  /* MESSAGES */
  .messages-area {
    flex: 1; overflow-y: auto;
    padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1rem;
  }

  .msg-date {
    text-align: center; font-size: 0.72rem;
    color: var(--muted); margin: 0.5rem 0;
  }
  .msg-date span {
    background: var(--gris2); padding: 0.2rem 0.8rem;
    border-radius: 50px;
  }

  .msg-row {
    display: flex; gap: 0.6rem; align-items: flex-end;
    max-width: 75%;
  }
  .msg-row.mine {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .msg-row.other { align-self: flex-start; }

  .msg-avatar-sm {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rouge), #FF4D6A);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 800; color: white;
    flex-shrink: 0;
  }

  .msg-bubble {
    padding: 0.75rem 1rem;
    border-radius: 18px;
    font-size: 0.88rem; line-height: 1.55;
    max-width: 100%;
  }
  .msg-row.other .msg-bubble {
    background: var(--blanc);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--night);
  }
  .msg-row.mine .msg-bubble {
    background: var(--rouge);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-time {
    font-size: 0.65rem; color: var(--muted);
    margin-top: 0.3rem; text-align: right;
    padding: 0 0.3rem;
  }
  .msg-row.mine .msg-time { text-align: left; }

  /* MESSAGE SYSTEME */
  .msg-system {
    text-align: center;
    background: rgba(26,122,74,0.08);
    border: 1px solid rgba(26,122,74,0.15);
    border-radius: 12px; padding: 0.7rem 1.2rem;
    font-size: 0.78rem; color: var(--vert);
    font-weight: 500; margin: 0.5rem auto;
    max-width: 80%;
  }
  .msg-system.rouge {
    background: rgba(204,10,43,0.06);
    border-color: rgba(204,10,43,0.15);
    color: var(--rouge);
  }

  /* PROPOSITION CARD */
  .msg-proposition {
    background: var(--blanc);
    border: 1.5px solid var(--border);
    border-radius: 16px; padding: 1.1rem;
    max-width: 320px; margin: 0.3rem 0;
  }
  .msg-proposition.mine { margin-left: auto; }
  .prop-header {
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem; font-weight: 800;
    margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .prop-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.7rem; }
  .prop-tarif {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 800; color: var(--rouge);
    margin-bottom: 0.8rem;
  }
  .prop-btns { display: flex; gap: 0.5rem; }
  .btn-accepter {
    flex: 1; padding: 0.6rem;
    background: var(--rouge); color: white;
    border: none; border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-accepter:hover { background: var(--rouge-dark); }
  .btn-refuser {
    padding: 0.6rem 1rem;
    background: transparent; color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-refuser:hover { border-color: var(--rouge); color: var(--rouge); }

  /* INPUT ZONE */
  .chat-input-zone {
    background: var(--blanc);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 0.8rem; align-items: flex-end;
  }
  .chat-input {
    flex: 1; padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; color: var(--night);
    background: var(--gris); outline: none;
    resize: none; max-height: 100px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--rouge); background: var(--blanc); }
  .chat-input::placeholder { color: rgba(26,0,8,0.3); }
  .btn-send {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--rouge); color: white;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--rouge-dark); transform: scale(1.05); }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    background: var(--gris);
    border-radius: 50px;
    padding: 0.25rem;
    margin-bottom: 0.9rem;
    gap: 0.25rem;
  }
  .mode-btn {
    flex: 1; text-align: center;
    padding: 0.5rem 0.6rem;
    border-radius: 50px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    color: var(--muted); background: transparent;
    display: flex; align-items: center; justify-content: center; gap: 0.3rem;
  }
  .mode-btn.active {
    background: var(--rouge); color: white;
    box-shadow: 0 2px 8px rgba(204,10,43,0.25);
  }
  .mode-btn.locked {
    opacity: 0.45; cursor: not-allowed;
  }
  .mode-btn.locked:hover::after {
    content: 'Créez un compte prestataire pour accéder';
    position: absolute;
    background: var(--night); color: white;
    font-size: 0.72rem; padding: 0.4rem 0.8rem;
    border-radius: 8px; white-space: nowrap;
    bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
  }
  .mode-btn { position: relative; }

  /* EMPTY CHAT */
  .chat-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .chat-empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .chat-empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 800; margin-bottom: 0.5rem;
  }
  .chat-empty-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

  /* MOBILE */
  @media (max-width: 680px) {
    .sidebar {
      width: 100%;
      display: none;
      position: fixed; inset: 0; z-index: 50;
      top: 62px;
    }
    .sidebar.mobile-open { display: flex; }
    .chat-area { width: 100%; }
    .btn-back-mobile {
      display: flex; align-items: center; gap: 0.4rem;
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; color: var(--muted);
      cursor: pointer; padding: 0;
    }
    .msg-row { max-width: 88%; }
  }
  @media (min-width: 681px) {
    .btn-back-mobile { display: none; }
  }
</style>
</head>

<nav>

<!-- LAYOUT -->
<div class="chat-layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">💬 Messages</div>

      <!-- TOGGLE CLIENT / PRESTATAIRE -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-client" onclick="setMode('client')">🔍 Client</button>
        <button class="mode-btn" id="btn-presta" onclick="setMode('presta')">🛠️ Prestataire</button>
      </div>

      <div class="sidebar-search">
        <input type="text" placeholder="Rechercher une conversation...">
      </div>
    </div>

    <div class="conv-list"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <!-- CHAT HEADER -->
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="btn-back-mobile" onclick="toggleSidebar()">← Retour</button>
        <div class="chat-header-avatar"></div>
        <div>
          <div class="chat-header-name"></div>
          <div class="chat-header-status"></div>
        </div>
        <div class="chat-header-mission"></div>
      </div>
      <div class="chat-header-actions"></div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-area" id="messages-area"></div>

    <!-- INPUT -->
    <div class="chat-input-zone">
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Votre message..." rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  // Vider la liste de conversations statiques immédiatement
  const convListEl = document.querySelector('.conv-list');
  if (convListEl) convListEl.innerHTML = '';

  let currentUser    = null;
  let currentMission = null;
  let realtimeChannel = null;
  let allMissions    = { client: [], presta: [] };
  let currentMode    = 'client';

  // ── UI HELPERS ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('mobile-open');
  }

  function escHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── MODE TOGGLE ──
  function setMode(mode) {
    if (mode === 'presta' && currentUser?.role !== 'prestataire') return;
    currentMode = mode;
    document.getElementById('btn-client').classList.toggle('active', mode === 'client');
    document.getElementById('btn-presta').classList.toggle('active', mode === 'presta');
    renderConvList(allMissions[mode] || []);
  }

  // ── LISTE CONVERSATIONS ──
  function renderConvList(missions) {
    const list = document.querySelector('.conv-list');
    list.innerHTML = '';
    if (missions.length === 0) {
      list.innerHTML = '<div style="padding:1.5rem 1.2rem;font-size:0.82rem;color:var(--muted);text-align:center;">Aucune conversation</div>';
      return;
    }
    missions.forEach(m => list.appendChild(buildConvItem(m)));
  }

  function buildConvItem(mission) {
    const other  = currentMode === 'client' ? mission.prestataire : mission.client;
    const init   = other ? ((other.prenom||'?')[0]+(other.nom||'?')[0]).toUpperCase() : '??';
    const nom    = other ? `${other.prenom||''} ${other.nom||''}`.trim() : 'Utilisateur';
    const ann    = mission.annonces;
    const svc = ann ? `${catEmoji(ann.categorie)} ${ann.titre}` : 'Mission';
    const dateS  = formatDate(mission.created_at);
    const statutTxt = { en_attente:'⏳ En attente', en_cours:'✅ En cours', terminee:'🏁 Terminée', annulee:'❌ Annulée' }[mission.statut] || mission.statut;

    const div = document.createElement('div');
    div.className = 'conv-item';
    div.dataset.missionId = mission.id;
    div.innerHTML = `
      <div class="conv-avatar">${init}</div>
      <div class="conv-info">
        <div class="conv-service">${escHTML(svc)}</div>
        <div class="conv-top">
          <span class="conv-name">${escHTML(nom)}</span>
          <span class="conv-time">${dateS}</span>
        </div>
        <div class="conv-last">${statutTxt}</div>
      </div>`;
    div.onclick = () => ouvrirMission(mission);
    return div;
  }

  // ── OUVRIR MISSION ──
  async function ouvrirMission(mission) {
    currentMission = mission;
    document.querySelectorAll('.conv-item').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-mission-id="${mission.id}"]`)?.classList.add('active');

    const other = currentMode === 'client' ? mission.prestataire : mission.client;
    const init  = other ? ((other.prenom||'?')[0]+(other.nom||'?')[0]).toUpperCase() : '??';
    const nom   = other ? `${other.prenom||''} ${other.nom||''}`.trim() : 'Utilisateur';
    const ann   = mission.annonces;
    const svc   = ann ? `${catEmoji(ann.categorie)} ${ann.titre}` : 'Mission';

    document.querySelector('.chat-header-avatar').textContent = init;
    document.querySelector('.chat-header-name').textContent   = nom;
    document.querySelector('.chat-header-mission').textContent = svc;

    // Bouton "Terminer" injecté dynamiquement dans les actions du header
    const actionsEl = document.querySelector('.chat-header-actions');
    if (actionsEl) {
      actionsEl.innerHTML = '';
      if (mission.statut === 'en_cours') {
        const btnT = document.createElement('button');
        btnT.className = 'btn-terminer-chat';
        btnT.textContent = '✅ Terminer la mission';
        btnT.onclick = () => { window.location.href = `apijob-evaluation.html?mission=${mission.id}`; };
        actionsEl.appendChild(btnT);
      }
    }

    // Réactivité : désactiver input si mission terminée/annulée
    const inputZone = document.querySelector('.chat-input-zone');
    inputZone.style.opacity = ['terminee','annulee'].includes(mission.statut) ? '0.5' : '1';
    document.getElementById('chat-input').disabled = ['terminee','annulee'].includes(mission.statut);

    await chargerMessages(mission.id);

    // Realtime
    if (realtimeChannel) db.removeChannel(realtimeChannel);
    realtimeChannel = db.channel(`msgs_${mission.id}`)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`mission_id=eq.${mission.id}` },
        (payload) => {
          if (payload.new.sender_id !== currentUser.id) {
            appendMessage({ ...payload.new, profiles: other }, null, true);
          }
        })
      .subscribe();

    if (window.innerWidth <= 680) document.getElementById('sidebar').classList.remove('mobile-open');
  }

  // ── CHARGER MESSAGES ──
  async function chargerMessages(missionId) {
    const area = document.getElementById('messages-area');
    area.innerHTML = '<div style="text-align:center;padding:2rem;font-size:0.82rem;color:var(--muted);">Chargement…</div>';

    // On ne joint pas profiles ici (la FK sender_id peut pointer auth.users et non profiles)
    // Les profils sont récupérés depuis currentMission
    const { data: msgs, error } = await db.from('messages')
      .select('id, mission_id, sender_id, contenu, created_at')
      .eq('mission_id', missionId)
      .order('created_at', { ascending: true });

    if (error) {
      console.error('chargerMessages erreur:', JSON.stringify(error));
      area.innerHTML = `<div style="text-align:center;padding:2rem;font-size:0.82rem;color:var(--rouge);">Erreur : ${error.message || error.code || 'inconnue'}</div>`;
      return;
    }

    area.innerHTML = '';

    // Message système selon statut
    const sm = document.createElement('div');
    sm.className = 'msg-system';
    sm.textContent = { en_attente:'🪙 Proposition envoyée — en attente d\'acceptation', en_cours:'✅ Mission en cours · jeton débité', terminee:'🏁 Mission terminée', annulee:'❌ Proposition refusée' }[currentMission.statut] || '';
    area.appendChild(sm);

    // Carte proposition si en_attente
    if (currentMission.statut === 'en_attente' && currentMission.proposition_id) {
      await afficherCarteProposition(area, currentMission.proposition_id);
    }

    if (msgs.length === 0) {
      const em = document.createElement('div');
      em.style.cssText = 'text-align:center;padding:1.5rem;font-size:0.82rem;color:var(--muted);';
      em.textContent = 'Commencez la conversation…';
      area.appendChild(em);
    } else {
      msgs.forEach(m => appendMessage(m, area, false));
    }

    area.scrollTop = area.scrollHeight;
  }

  // ── CARTE PROPOSITION ──
  async function afficherCarteProposition(area, propositionId) {
    const { data: prop } = await db.from('propositions')
      .select('*, profiles!prestataire_id(prenom, nom)')
      .eq('id', propositionId).single();
    if (!prop) return;

    const pName  = prop.profiles ? `${prop.profiles.prenom||''} ${prop.profiles.nom||''}`.trim() : 'Prestataire';
    const isClient = currentUser.role === 'client';
    const tariStr  = prop.tarif ? prop.tarif.toLocaleString('fr-FR') + ' XPF' : '—';

    const card = document.createElement('div');
    card.className = 'msg-proposition';
    card.id = 'prop-card';
    card.innerHTML = `
      <div class="prop-header">📩 Proposition de ${escHTML(pName)}</div>
      <div class="prop-text">${escHTML(prop.message || '')}</div>
      <div class="prop-tarif">${tariStr}${prop.disponibilite ? ' · ' + escHTML(prop.disponibilite) : ''}</div>
      <div class="prop-btns" id="prop-btns">
        ${isClient
          ? `<button class="btn-accepter" onclick="accepterProp('${prop.id}','${prop.prestataire_id}')">✓ Accepter</button>
             <button class="btn-refuser"  onclick="refuserProp('${prop.id}')">✕ Refuser</button>`
          : '<span style="font-size:0.75rem;color:var(--muted);font-style:italic;">En attente du client…</span>'}
      </div>`;
    area.appendChild(card);
  }

  // ── ACCEPTER PROPOSITION ──
  async function accepterProp(propositionId, prestataireId) {
    const btns = document.getElementById('prop-btns');
    btns.innerHTML = '<span style="font-size:0.82rem;color:var(--muted);">Traitement…</span>';

    try {
      await db.from('propositions').update({ statut: 'acceptee' }).eq('id', propositionId);
      await db.from('missions').update({ statut: 'en_cours' }).eq('id', currentMission.id);

      // Débit jeton prestataire (sauf Pro)
      const { data: presta } = await db.from('profiles').select('tokens, is_pro').eq('id', prestataireId).single();
      if (presta && !presta.is_pro && presta.tokens > 0) {
        await db.from('profiles').update({ tokens: presta.tokens - 1 }).eq('id', prestataireId);
        await db.from('transactions_jetons').insert({ user_id: prestataireId, type: 'debit', quantite: 1, mission_id: currentMission.id });
      }
      await createNotification(prestataireId, 'mission_acceptee', 'Proposition acceptée !', 'Votre proposition a été acceptée. La mission commence !');

      btns.innerHTML = '<span style="color:var(--vert);font-weight:600;">✅ Acceptée</span>';
      const sysDiv = document.createElement('div');
      sysDiv.className = 'msg-system';
      sysDiv.textContent = '✅ Proposition acceptée — Mission démarrée · 1 jeton débité';
      document.getElementById('messages-area').appendChild(sysDiv);
      document.getElementById('messages-area').scrollTop = 999999;

      currentMission.statut = 'en_cours';
      const actEl = document.querySelector('.chat-header-actions');
      if (actEl) {
        actEl.innerHTML = '';
        const btnT = document.createElement('button');
        btnT.className = 'btn-terminer-chat';
        btnT.textContent = '✅ Terminer la mission';
        btnT.onclick = () => { window.location.href = `apijob-evaluation.html?mission=${currentMission.id}`; };
        actEl.appendChild(btnT);
      }
      document.querySelector('.chat-input-zone').style.opacity = '1';
      document.getElementById('chat-input').disabled = false;
    } catch(e) {
      console.error(e);
      btns.innerHTML = '<span style="color:var(--rouge);">Erreur, réessayez</span>';
    }
  }

  // ── REFUSER PROPOSITION ──
  async function refuserProp(propositionId) {
    await db.from('propositions').update({ statut: 'refusee' }).eq('id', propositionId);
    await db.from('missions').update({ statut: 'annulee' }).eq('id', currentMission.id);
    await createNotification(currentMission.prestataire_id, 'mission_refusee', 'Proposition refusée', 'Votre proposition n\'a pas été retenue.');
    document.getElementById('prop-btns').innerHTML = '<span style="color:var(--rouge);font-weight:600;">❌ Refusée</span>';
    currentMission.statut = 'annulee';
    const actElR = document.querySelector('.chat-header-actions');
    if (actElR) actElR.innerHTML = '';
    document.querySelector('.chat-input-zone').style.opacity = '0.5';
    document.getElementById('chat-input').disabled = true;
  }

  // ── APPEND MESSAGE ──
  function appendMessage(msg, area = null, scroll = true) {
    const zone  = area || document.getElementById('messages-area');
    const isMine = msg.sender_id === currentUser.id;
    // Profil depuis le join (messages anciens) ou depuis currentMission (nouveau chemin sans join)
    let p = msg.profiles;
    if (!p) {
      if (isMine) p = currentUser;
      else if (currentMission) p = currentMode === 'client' ? currentMission.prestataire : currentMission.client;
    }
    const init  = p ? ((p.prenom||'?')[0]+(p.nom||'?')[0]).toUpperCase() : '??';
    const time  = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
    row.innerHTML = isMine
      ? `<div><div class="msg-bubble">${escHTML(msg.contenu)}</div><div class="msg-time">${time}</div></div>`
      : `<div class="msg-avatar-sm">${init}</div><div><div class="msg-bubble">${escHTML(msg.contenu)}</div><div class="msg-time">${time}</div></div>`;
    zone.appendChild(row);
    if (scroll) zone.scrollTop = zone.scrollHeight;
  }

  // ── ENVOYER MESSAGE ──
  async function sendMessage() {
    if (!currentMission || ['terminee','annulee'].includes(currentMission.statut)) return;
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    // Affichage optimiste
    appendMessage({ sender_id: currentUser.id, contenu: text, created_at: new Date().toISOString(), profiles: null });
    input.value = '';
    input.style.height = 'auto';

    const { error } = await db.from('messages').insert({
      mission_id: currentMission.id,
      sender_id:  currentUser.id,
      contenu:    text
    });
    if (error) console.error('Envoi message:', error);
  }

  // ── CHARGER MISSIONS ──
  async function chargerMissions() {
    const [{ data: mClient, error: eClient }, { data: mPresta, error: ePresta }] = await Promise.all([
      db.from('missions')
        .select('*, annonces(titre, categorie), prestataire:profiles!prestataire_id(prenom, nom)')
        .eq('client_id', currentUser.id)
        .neq('statut', 'annulee')
        .order('created_at', { ascending: false }),
      db.from('missions')
        .select('*, annonces(titre, categorie), client:profiles!client_id(prenom, nom)')
        .eq('prestataire_id', currentUser.id)
        .neq('statut', 'annulee')
        .order('created_at', { ascending: false })
    ]);
    if (eClient) console.error('chargerMissions client:', JSON.stringify(eClient));
    if (ePresta) console.error('chargerMissions presta:', JSON.stringify(ePresta));
    allMissions.client = mClient || [];
    allMissions.presta = mPresta || [];
  }

  // ── INIT ──
  (async () => {
    currentUser = await requireAuth();
    if (!currentUser) return;

    const isPresta = currentUser.role === 'prestataire';
    if (!isPresta) {
      const bp = document.getElementById('btn-presta');
      bp.classList.add('locked');
      bp.disabled = true;
    }

    await chargerMissions();

    // Détecter le mode selon le rôle et l'URL
    const missionIdFromUrl = new URLSearchParams(window.location.search).get('mission');
    let modeAuto = isPresta ? 'presta' : 'client';

    // Si une mission est passée en URL, forcer le bon mode
    if (missionIdFromUrl) {
      const inClient = allMissions.client.find(m => m.id === missionIdFromUrl);
      const inPresta = allMissions.presta.find(m => m.id === missionIdFromUrl);
      if (inPresta) modeAuto = 'presta';
      else if (inClient) modeAuto = 'client';
    }

    setMode(modeAuto);

    // Ouvrir la mission de l'URL en priorité, sinon la première
    const missionCible = missionIdFromUrl
      ? allMissions[modeAuto].find(m => m.id === missionIdFromUrl) || allMissions[modeAuto][0]
      : allMissions[modeAuto][0];

    if (missionCible) {
      await ouvrirMission(missionCible);
    } else {
      document.querySelector('.chat-header').style.visibility = 'hidden';
      document.querySelector('.chat-input-zone').style.display = 'none';
      document.getElementById('messages-area').innerHTML = `
        <div class="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <div class="chat-empty-title">Aucune conversation</div>
          <div class="chat-empty-sub">Vos échanges apparaîtront ici après l'envoi d'une proposition.</div>
        </div>`;
    }
  })();
</script>

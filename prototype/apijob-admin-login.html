<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Accès Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--night);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:2rem;
    position:relative; overflow:hidden;
  }

  /* FOND DÉCO */
  body::before {
    content:'';
    position:absolute; top:-100px; right:-100px;
    width:400px; height:400px; border-radius:50%;
    background:rgba(204,10,43,0.08); pointer-events:none;
  }
  body::after {
    content:'';
    position:absolute; bottom:-100px; left:-100px;
    width:300px; height:300px; border-radius:50%;
    background:rgba(240,165,0,0.04); pointer-events:none;
  }

  .login-card {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:2.5rem;
    width:100%; max-width:420px;
    position:relative; z-index:1;
    animation:fadeUp 0.5s ease both;
    backdrop-filter:blur(10px);
  }

  .login-logo {
    display:flex; align-items:center; justify-content:center;
    gap:0.5rem; margin-bottom:0.5rem;
  }
  .login-logo-text {
    font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
    color:var(--blanc);
  }
  .login-logo-text span { color:var(--or); }
  .admin-chip {
    background:var(--rouge); color:white;
    font-size:0.65rem; font-weight:800;
    padding:0.2rem 0.6rem; border-radius:50px;
    letter-spacing:1px;
  }

  .login-title {
    font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
    color:var(--blanc); text-align:center; margin-bottom:0.4rem;
  }
  .login-sub {
    font-size:0.82rem; color:rgba(255,255,255,0.35);
    text-align:center; margin-bottom:2rem; line-height:1.5;
  }

  .form-group { margin-bottom:1.1rem; }
  .form-label {
    display:block; font-size:0.78rem; font-weight:600;
    color:rgba(255,255,255,0.5); margin-bottom:0.4rem;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .form-input {
    width:100%; padding:0.85rem 1rem;
    background:rgba(255,255,255,0.06);
    border:1.5px solid rgba(255,255,255,0.1);
    border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:0.92rem; color:var(--blanc);
    outline:none; transition:all 0.2s;
  }
  .form-input:focus {
    border-color:var(--rouge);
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 0 3px rgba(204,10,43,0.15);
  }
  .form-input::placeholder { color:rgba(255,255,255,0.2); }

  .password-wrap { position:relative; }
  .toggle-pwd {
    position:absolute; right:0.8rem; top:50%;
    transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    font-size:1rem; color:rgba(255,255,255,0.4);
    transition:color 0.2s;
  }
  .toggle-pwd:hover { color:rgba(255,255,255,0.8); }

  .error-msg {
    background:rgba(204,10,43,0.15);
    border:1px solid rgba(204,10,43,0.3);
    border-radius:10px; padding:0.7rem 1rem;
    font-size:0.82rem; color:#FF6B6B;
    margin-bottom:1rem; display:none;
    text-align:center;
  }
  .error-msg.show { display:block; animation:shake 0.4s ease; }

  .btn-login {
    width:100%; padding:0.95rem;
    background:var(--rouge); color:white;
    border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:0.95rem; font-weight:700;
    cursor:pointer; transition:all 0.2s;
    margin-top:0.5rem;
  }
  .btn-login:hover { background:var(--rouge-dark); transform:translateY(-1px); box-shadow:0 6px 20px rgba(204,10,43,0.4); }
  .btn-login:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

  .attempts-left {
    text-align:center; font-size:0.75rem;
    color:rgba(255,255,255,0.25); margin-top:1rem;
  }
  .attempts-left span { color:#FF6B6B; font-weight:700; }

  .back-link {
    display:block; text-align:center;
    margin-top:1.5rem;
    font-size:0.78rem; color:rgba(255,255,255,0.25);
    text-decoration:none; transition:color 0.2s;
  }
  .back-link:hover { color:rgba(255,255,255,0.5); }

  /* LOCKED */
  .locked-state {
    text-align:center; display:none;
  }
  .locked-icon { font-size:3rem; margin-bottom:1rem; }
  .locked-title {
    font-family:'Syne',sans-serif; font-size:1.1rem;
    font-weight:800; color:var(--blanc); margin-bottom:0.5rem;
  }
  .locked-sub { font-size:0.82rem; color:rgba(255,255,255,0.35); line-height:1.6; }
  .countdown {
    font-family:'Syne',sans-serif; font-size:2rem;
    font-weight:800; color:var(--rouge); margin:1rem 0;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20% { transform:translateX(-8px); }
    40% { transform:translateX(8px); }
    60% { transform:translateX(-5px); }
    80% { transform:translateX(5px); }
  }
</style>
</head>
<body>

<div class="login-card">

  <div class="login-logo">
    <svg width="24" height="24" viewBox="0 0 28 28" style="border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="c"><circle cx="14" cy="14" r="14"/></clipPath></defs><g clip-path="url(#c)"><circle cx="14" cy="14" r="14" fill="white"/><g stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><line x1="14" y1="17" x2="2.2" y2="14.9"/><line x1="14" y1="17" x2="3.4" y2="11.4"/><line x1="14" y1="17" x2="5.7" y2="8.4"/><line x1="14" y1="17" x2="8.5" y2="6.3"/><line x1="14" y1="17" x2="12.1" y2="5.2"/><line x1="14" y1="17" x2="15.9" y2="5.2"/><line x1="14" y1="17" x2="19.5" y2="6.3"/><line x1="14" y1="17" x2="22.3" y2="8.4"/><line x1="14" y1="17" x2="24.6" y2="11.4"/><line x1="14" y1="17" x2="25.8" y2="14.9"/></g><rect x="0" y="17" width="28" height="11" fill="#1E7FC2"/><path d="M7,17.5 Q14,15.5 21,17.5 L20.5,18.5 Q14,16.8 7.5,18.5 Z" fill="#CE1126"/><path d="M3,19.5 Q7,18.5 11,19.5 Q14,20.5 17,19.5 Q21,18.5 25,19.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.8"/><path d="M3,21.5 Q7,20.5 11,21.5 Q14,22.5 17,21.5 Q21,20.5 25,21.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/><path d="M3,23.5 Q7,22.5 11,23.5 Q14,24.5 17,23.5 Q21,22.5 25,23.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.4"/></g></svg>
    <div class="login-logo-text">API<span>.</span>JOB</div>
    <span class="admin-chip">ADMIN</span>
  </div>

  <!-- FORMULAIRE -->
  <div id="login-form">
    <div class="login-title">Accès réservé 🔐</div>
    <div class="login-sub">Cette zone est réservée à l'administrateur d'API JOB.</div>

    <div class="error-msg" id="error-msg">❌ Email ou mot de passe incorrect</div>

    <div class="form-group">
      <label class="form-label">Email administrateur</label>
      <input type="email" class="form-input" id="admin-email" placeholder="admin@apijob.pf" onkeydown="if(event.key==='Enter') login()">
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <div class="password-wrap">
        <input type="password" class="form-input" id="admin-pwd" placeholder="••••••••••" onkeydown="if(event.key==='Enter') login()">
        <button class="toggle-pwd" onclick="togglePwd()" type="button">👁️</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="login()">🔐 Accéder au panneau admin</button>

    <div class="attempts-left" id="attempts-left" style="display:none;">
      ⚠️ Plus que <span id="attempts-num">2</span> tentative(s) avant blocage
    </div>
  </div>

  <!-- ÉTAT BLOQUÉ -->
  <div class="locked-state" id="locked-state">
    <div class="locked-icon">🔒</div>
    <div class="locked-title">Accès bloqué</div>
    <div class="locked-sub">Trop de tentatives incorrectes. L'accès est temporairement bloqué.</div>
    <div class="countdown" id="countdown">05:00</div>
    <div class="locked-sub">Réessayez dans <strong id="countdown-text">5 minutes</strong>.</div>
  </div>

  <a href="apijob-v4.html" class="back-link">← Retour au site</a>

</div>

<script>
  // ⚠️ IMPORTANT : Changer ces identifiants avant la mise en ligne !
  const ADMIN_EMAIL = 'admin@apijob.pf';
  const ADMIN_PASSWORD = 'ApiJob2025!';

  let attempts = 0;
  const MAX_ATTEMPTS = 3;
  let lockTimer = null;

  function login() {
    const email = document.getElementById('admin-email').value.trim();
    const pwd = document.getElementById('admin-pwd').value;
    const btn = document.getElementById('btn-login');

    btn.disabled = true;
    btn.textContent = '⏳ Vérification...';

    setTimeout(() => {
      if (email === ADMIN_EMAIL && pwd === ADMIN_PASSWORD) {
        // Succès
        sessionStorage.setItem('apijob_admin', 'true');
        btn.textContent = '✅ Accès autorisé !';
        btn.style.background = '#1A7A4A';
        setTimeout(() => { window.location.href = 'apijob-admin.html'; }, 800);
      } else {
        // Échec
        attempts++;
        const remaining = MAX_ATTEMPTS - attempts;

        document.getElementById('error-msg').classList.add('show');
        btn.disabled = false;
        btn.textContent = '🔐 Accéder au panneau admin';

        if (remaining <= 0) {
          startLockout();
        } else {
          document.getElementById('attempts-left').style.display = 'block';
          document.getElementById('attempts-num').textContent = remaining;
        }
      }
    }, 800);
  }

  function startLockout() {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('locked-state').style.display = 'block';

    let seconds = 300; // 5 minutes
    lockTimer = setInterval(() => {
      seconds--;
      const m = Math.floor(seconds / 60).toString().padStart(2,'0');
      const s = (seconds % 60).toString().padStart(2,'0');
      document.getElementById('countdown').textContent = `${m}:${s}`;
      document.getElementById('countdown-text').textContent = `${m} minute${m > 1 ? 's' : ''}`;

      if (seconds <= 0) {
        clearInterval(lockTimer);
        attempts = 0;
        document.getElementById('locked-state').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('error-msg').classList.remove('show');
        document.getElementById('attempts-left').style.display = 'none';
        document.getElementById('btn-login').textContent = '🔐 Accéder au panneau admin';
      }
    }, 1000);
  }

  function togglePwd() {
    const input = document.getElementById('admin-pwd');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>

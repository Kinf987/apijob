<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Confirmez votre email</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
    --vert: #1A7A4A;
    --vert-light: rgba(26,122,74,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--gris); color:var(--night);
    min-height:100vh; display:flex; flex-direction:column;
  }

  nav {
    background:var(--blanc); border-bottom:2px solid var(--rouge);
    padding:1rem 5%;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-logo {
    font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800;
    color:var(--rouge); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.25rem; cursor:default;
  }
  .nav-logo span { color:var(--or); }

  main {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:2rem 1.5rem;
  }

  .page { width:100%; max-width:440px; text-align:center; }

  .icon-wrap {
    position:relative; display:inline-block;
    margin-bottom:1.5rem;
    animation:pop 0.5s ease 0.1s both;
  }
  .icon-main { font-size:4rem; display:block; }
  .icon-badge {
    position:absolute; bottom:-4px; right:-8px;
    font-size:1.4rem;
    animation:pop 0.4s ease 0.4s both;
  }

  h1 {
    font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800;
    letter-spacing:-0.5px; margin-bottom:0.6rem;
    animation:fadeUp 0.4s ease 0.15s both;
  }
  h1 span { color:var(--rouge); }

  .sub {
    font-size:0.9rem; color:var(--muted); line-height:1.65;
    margin-bottom:2rem;
    animation:fadeUp 0.4s ease 0.2s both;
  }
  .sub strong { color:var(--night); font-weight:600; }

  /* Email simulé */
  .email-card {
    background:var(--blanc); border-radius:20px;
    border:1.5px solid var(--border);
    padding:1.4rem; margin-bottom:1.5rem; text-align:left;
    animation:fadeUp 0.4s ease 0.25s both;
  }
  .email-header {
    display:flex; align-items:center; gap:0.75rem;
    padding-bottom:0.9rem; border-bottom:1px solid var(--gris2);
    margin-bottom:0.9rem;
  }
  .email-avatar {
    width:36px; height:36px; border-radius:50%;
    background:rgba(204,10,43,0.1);
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; flex-shrink:0;
  }
  .email-from { font-size:0.82rem; }
  .email-from strong { display:block; font-weight:600; font-size:0.88rem; }
  .email-from span { color:var(--muted); }

  .email-subject {
    font-size:0.88rem; font-weight:600; margin-bottom:0.5rem;
  }
  .email-body {
    font-size:0.82rem; color:var(--muted); line-height:1.6; margin-bottom:1rem;
  }

  .btn-confirm {
    width:100%; padding:0.75rem;
    background:var(--rouge); color:white; border:none;
    border-radius:12px; font-family:'DM Sans',sans-serif;
    font-size:0.88rem; font-weight:700; cursor:pointer;
    transition:all 0.2s;
  }
  .btn-confirm:hover { background:var(--rouge-dark); }

  /* Actions */
  .actions {
    display:flex; flex-direction:column; gap:0.75rem;
    animation:fadeUp 0.4s ease 0.3s both;
  }

  .btn-resend {
    width:100%; padding:0.9rem;
    background:var(--blanc); color:var(--night);
    border:1.5px solid var(--gris2); border-radius:14px;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-resend:hover { border-color:var(--rouge); color:var(--rouge); }
  .btn-resend:disabled { opacity:0.5; cursor:default; }

  .help-text {
    font-size:0.78rem; color:var(--muted); margin-top:1.2rem;
    animation:fadeUp 0.4s ease 0.35s both;
  }
  .help-text a { color:var(--muted); text-decoration:underline; }

  /* Toast */
  .toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--night); color:white;
    padding:0.7rem 1.3rem; border-radius:50px;
    font-size:0.85rem; font-weight:500;
    transition:transform 0.3s ease, opacity 0.3s ease;
    opacity:0; pointer-events:none; white-space:nowrap;
    z-index:999;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes pop {
    0% { transform:scale(0.5); opacity:0; }
    80% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
  }
</style>
</head>
<body>

<nav>
  <a href="apijob-v4.html" class="nav-logo" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 28 28" style="border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="c"><circle cx="14" cy="14" r="14"/></clipPath></defs><g clip-path="url(#c)"><circle cx="14" cy="14" r="14" fill="white"/><g stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><line x1="14" y1="17" x2="2.2" y2="14.9"/><line x1="14" y1="17" x2="3.4" y2="11.4"/><line x1="14" y1="17" x2="5.7" y2="8.4"/><line x1="14" y1="17" x2="8.5" y2="6.3"/><line x1="14" y1="17" x2="12.1" y2="5.2"/><line x1="14" y1="17" x2="15.9" y2="5.2"/><line x1="14" y1="17" x2="19.5" y2="6.3"/><line x1="14" y1="17" x2="22.3" y2="8.4"/><line x1="14" y1="17" x2="24.6" y2="11.4"/><line x1="14" y1="17" x2="25.8" y2="14.9"/></g><rect x="0" y="17" width="28" height="11" fill="#1E7FC2"/><path d="M7,17.5 Q14,15.5 21,17.5 L20.5,18.5 Q14,16.8 7.5,18.5 Z" fill="#CE1126"/><path d="M3,19.5 Q7,18.5 11,19.5 Q14,20.5 17,19.5 Q21,18.5 25,19.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.8"/><path d="M3,21.5 Q7,20.5 11,21.5 Q14,22.5 17,21.5 Q21,20.5 25,21.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/><path d="M3,23.5 Q7,22.5 11,23.5 Q14,24.5 17,23.5 Q21,22.5 25,23.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.4"/></g></svg> API<span>JOB</span></a>
</nav>

<main>
  <div class="page">

    <div class="icon-wrap">
      <span class="icon-main">📬</span>
      <span class="icon-badge">✉️</span>
    </div>

    <h1>Vérifiez votre <span>boite mail</span></h1>
    <p class="sub">
      On a envoyé un lien de confirmation à<br>
      <strong id="email-display">teiva.m@gmail.com</strong><br>
      Cliquez dessus pour activer votre compte.
    </p>

    <div class="actions">
      <button class="btn-resend" id="btn-resend" onclick="renvoyer()">
        Renvoyer l'email
      </button>
    </div>

    <p class="help-text">
      Vous ne trouvez pas l'email ? Vérifiez vos spams.<br>
      <a href="apijob-contact.html">Contacter le support</a>
    </p>

  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role') || 'presta';

  // Affiche le vrai email stocké lors de l'inscription
  const pendingEmail = sessionStorage.getItem('pending_email') || 'votre@email.com';
  document.getElementById('email-display').textContent = pendingEmail;

  // Supabase envoie le vrai email — ce bouton n'est plus nécessaire
  // mais on le garde visible pour renvoi
  let cooldown = false;
  async function renvoyer() {
    if (cooldown) return;
    cooldown = true;
    const btn = document.getElementById('btn-resend');
    btn.disabled = true;

    const { error } = await db.auth.resend({ type: 'signup', email: pendingEmail });
    toastMsg(error ? 'Erreur, réessayez.' : 'Email renvoyé !');

    let sec = 30;
    btn.textContent = `Renvoyer (${sec}s)`;
    const interval = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.textContent = "Renvoyer l'email";
        cooldown = false;
      } else {
        btn.textContent = `Renvoyer (${sec}s)`;
      }
    }, 1000);
  }

  function toastMsg(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Décompte 5s → retour accueil
  let remaining = 5;
  const countdownEl = document.createElement('p');
  countdownEl.style.cssText = 'margin-top:1.2rem;font-size:0.82rem;color:var(--muted);';
  countdownEl.innerHTML = `Retour à l'accueil dans <strong id="countdown">5</strong>s — <a href="apijob-v4.html" style="color:var(--rouge);text-decoration:none;">y aller maintenant</a>`;
  document.querySelector('.help-text').after(countdownEl);

  const timer = setInterval(() => {
    remaining--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(timer);
      window.location.href = 'apijob-v4.html';
    }
  }, 1000);
</script>

</body>
</html>

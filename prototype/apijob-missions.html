<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API JOB — Mes missions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #CC0A2B;
    --rouge-dark: #A00822;
    --or: #F0A500;
    --night: #1A0008;
    --blanc: #FFFFFF;
    --gris: #F7F3F0;
    --gris2: #EDE8E3;
    --muted: rgba(26,0,8,0.45);
    --border: rgba(204,10,43,0.1);
    --vert: #1A7A4A;
    --vert-light: rgba(26,122,74,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--gris); color:var(--night); min-height:100vh; }

  /* NAV */
  nav {
    position:sticky; top:0; z-index:100;
    background:var(--blanc); border-bottom:2px solid var(--rouge);
    padding:0.9rem 5%;
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
  }
  .nav-logo {
    font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
    color:var(--rouge); letter-spacing:-0.5px;
    display:flex; align-items:center; gap:0.25rem; cursor:default;
  }
  .nav-logo span { color:var(--or); }
  .nav-right { display:flex; align-items:center; gap:1rem; }
  .nav-back { font-size:0.88rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--rouge); }

  /* PAGE */
  .page { max-width:800px; margin:0 auto; padding:2rem 5%; }

  /* HEADER */
  .page-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;
  }
  .page-title {
    font-family:'Syne',sans-serif;
    font-size:1.6rem; font-weight:800; letter-spacing:-0.5px;
  }

  /* TOGGLE CLIENT / PRESTATAIRE */
  .mode-toggle {
    display:flex; background:var(--gris2);
    border-radius:50px; padding:0.25rem; gap:0.25rem;
  }
  .mode-btn {
    padding:0.5rem 1.2rem; border-radius:50px; border:none;
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; background:transparent; color:var(--muted);
  }
  .mode-btn.active {
    background:var(--rouge); color:white;
    box-shadow:0 2px 8px rgba(204,10,43,0.25);
  }

  /* STATS RAPIDES */
  .stats-row {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:1rem; margin-bottom:1.5rem;
  }
  .stat-card {
    background:var(--blanc); border-radius:16px;
    border:1.5px solid var(--border); padding:1rem 1.2rem;
    text-align:center;
  }
  .stat-num {
    font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
    color:var(--rouge); line-height:1;
  }
  .stat-label { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; }

  /* FILTRES STATUT */
  .filtres {
    display:flex; gap:0.5rem; flex-wrap:wrap;
    margin-bottom:1.2rem;
  }
  .filtre-btn {
    padding:0.45rem 1rem; border-radius:50px;
    border:1.5px solid var(--border);
    background:var(--blanc); color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500;
    cursor:pointer; transition:all 0.2s;
  }
  .filtre-btn:hover { border-color:var(--rouge); color:var(--rouge); }
  .filtre-btn.active { background:var(--rouge); color:white; border-color:var(--rouge); }

  /* MISSIONS */
  .missions-list { display:flex; flex-direction:column; gap:1rem; }

  .mission-card {
    background:var(--blanc); border-radius:20px;
    border:1.5px solid var(--border); padding:1.4rem 1.6rem;
    transition:all 0.2s; position:relative; overflow:hidden;
  }
  .mission-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:4px; background:transparent; transition:background 0.2s;
  }
  .mission-card.en-cours::before { background:var(--or); }
  .mission-card.en-attente::before { background:rgba(26,0,8,0.2); }
  .mission-card.terminee::before { background:var(--vert); }

  .mission-top {
    display:flex; align-items:flex-start; gap:1rem;
    margin-bottom:1rem;
  }
  .mission-emoji {
    font-size:1.8rem; flex-shrink:0;
    width:48px; height:48px; background:var(--gris);
    border-radius:12px; display:flex; align-items:center; justify-content:center;
  }
  .mission-content { flex:1; min-width:0; }
  .mission-title {
    font-family:'Syne',sans-serif; font-size:1rem; font-weight:800;
    margin-bottom:0.25rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mission-interlocuteur {
    font-size:0.82rem; color:var(--muted);
    display:flex; align-items:center; gap:0.4rem; margin-bottom:0.25rem;
  }
  .avatar-xs {
    width:20px; height:20px; border-radius:50%;
    background:linear-gradient(135deg,var(--rouge),#E8305A);
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-size:0.5rem; font-weight:800; color:white;
    flex-shrink:0;
  }
  .mission-date { font-size:0.78rem; color:var(--muted); }

  .mission-badge {
    font-size:0.72rem; font-weight:700;
    padding:0.3rem 0.8rem; border-radius:50px;
    white-space:nowrap; flex-shrink:0;
  }
  .badge-encours { background:rgba(240,165,0,0.15); color:#B07800; }
  .badge-attente { background:var(--gris2); color:var(--muted); }
  .badge-terminee { background:var(--vert-light); color:var(--vert); }

  .mission-footer {
    display:flex; align-items:center; justify-content:space-between;
    padding-top:1rem; border-top:1px solid var(--border);
    flex-wrap:wrap; gap:0.6rem;
  }
  .mission-footer-left { font-size:0.8rem; color:var(--muted); }
  .mission-actions { display:flex; gap:0.6rem; }

  .btn-action {
    padding:0.5rem 1.1rem; border-radius:50px;
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600;
    cursor:pointer; border:none; transition:all 0.2s; text-decoration:none;
    display:inline-flex; align-items:center; gap:0.3rem;
  }
  .btn-rouge { background:var(--rouge); color:white; }
  .btn-rouge:hover { background:var(--rouge-dark); }
  .btn-outline { background:transparent; color:var(--rouge); border:1.5px solid var(--rouge); }
  .btn-outline:hover { background:rgba(204,10,43,0.05); }
  .btn-gris { background:var(--gris2); color:var(--muted); }

  /* VIDE */
  .empty-state {
    text-align:center; padding:3rem 1rem;
    background:var(--blanc); border-radius:20px;
    border:1.5px solid var(--border);
  }
  .empty-icon { font-size:2.5rem; margin-bottom:0.8rem; }
  .empty-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; margin-bottom:0.4rem; }
  .empty-sub { font-size:0.85rem; color:var(--muted); }

  @media (max-width:600px) {
    .stats-row { grid-template-columns:repeat(3,1fr); gap:0.6rem; }
    .stat-num { font-size:1.3rem; }
    .mission-title { white-space:normal; }
  }
</style>
</head>
<body>

<nav>
  <a href="apijob-v4.html" class="nav-logo" style="text-decoration:none;"><svg width="24" height="24" viewBox="0 0 28 28" style="border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="c"><circle cx="14" cy="14" r="14"/></clipPath></defs><g clip-path="url(#c)"><circle cx="14" cy="14" r="14" fill="white"/><g stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><line x1="14" y1="17" x2="2.2" y2="14.9"/><line x1="14" y1="17" x2="3.4" y2="11.4"/><line x1="14" y1="17" x2="5.7" y2="8.4"/><line x1="14" y1="17" x2="8.5" y2="6.3"/><line x1="14" y1="17" x2="12.1" y2="5.2"/><line x1="14" y1="17" x2="15.9" y2="5.2"/><line x1="14" y1="17" x2="19.5" y2="6.3"/><line x1="14" y1="17" x2="22.3" y2="8.4"/><line x1="14" y1="17" x2="24.6" y2="11.4"/><line x1="14" y1="17" x2="25.8" y2="14.9"/></g><rect x="0" y="17" width="28" height="11" fill="#1E7FC2"/><path d="M7,17.5 Q14,15.5 21,17.5 L20.5,18.5 Q14,16.8 7.5,18.5 Z" fill="#CE1126"/><path d="M3,19.5 Q7,18.5 11,19.5 Q14,20.5 17,19.5 Q21,18.5 25,19.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.8"/><path d="M3,21.5 Q7,20.5 11,21.5 Q14,22.5 17,21.5 Q21,20.5 25,21.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/><path d="M3,23.5 Q7,22.5 11,23.5 Q14,24.5 17,23.5 Q21,22.5 25,23.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.4"/></g></svg>
    API<span>JOB</span></a>
  <div class="nav-right">
    <a href="apijob-dashboard.html" class="nav-back">← Dashboard</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">Mes missions</div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-num">—</div>
      <div class="stat-label">En cours</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">—</div>
      <div class="stat-label">Terminées</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">—</div>
      <div class="stat-label">Note moyenne</div>
    </div>
  </div>

  <!-- FILTRES -->
  <div class="filtres">
    <button class="filtre-btn active" onclick="setFiltre(this, 'toutes')">Toutes</button>
    <button class="filtre-btn" onclick="setFiltre(this, 'en-cours')">⏳ En cours</button>
    <button class="filtre-btn" onclick="setFiltre(this, 'en-attente')">🕐 En attente</button>
    <button class="filtre-btn" onclick="setFiltre(this, 'terminee')">✅ Terminées</button>
  </div>

  <!-- LISTE MISSIONS -->
  <div class="missions-list" id="missions-list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  let currentUser  = null;
  let currentFiltre = 'toutes';
  let allData = [];

  function setFiltre(btn, filtre) {
    currentFiltre = filtre;
    document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList(allData);
  }

  function escHTML(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  function statutInfo(statut) {
    return {
      en_cours:            { css: 'en-cours',   badge: 'badge-encours',  label: '⏳ En cours'          },
      en_attente_cloture:  { css: 'en-cours',   badge: 'badge-encours',  label: '⏳ En attente d\'avis' },
      en_attente:          { css: 'en-attente', badge: 'badge-attente',  label: '🕐 En attente'         },
      terminee:            { css: 'terminee',   badge: 'badge-terminee', label: '✅ Terminée'            },
      annulee:             { css: 'terminee',   badge: 'badge-attente',  label: '❌ Annulée'             },
    }[statut] || { css: 'en-attente', badge: 'badge-attente', label: statut };
  }

  // ── SIGNALER TERMINÉE (prestataire uniquement) ──
  async function signalerTerminee(missionId, clientId, clientPrenom) {
    if (!confirm('Confirmer que la mission est terminée ?')) return;
    await db.from('missions').update({ statut: 'en_attente_cloture' }).eq('id', missionId);
    await createNotification(
      clientId, 'validation_requise',
      '✅ Mission déclarée terminée',
      `Le prestataire a déclaré la mission terminée. Laisse ton avis pour clôturer.`,
      `apijob-evaluation.html?mission=${missionId}`
    );
    location.reload();
  }

  // ── CARTE MISSION ──
  function buildCard(mission) {
    const role = mission._role;
    const other = role === 'prestataire' ? mission.client : mission.prestataire;
    const init  = other ? ((other.prenom||'?')[0]+(other.nom||'?')[0]).toUpperCase() : '??';
    const nom   = other ? `${other.prenom||''} ${other.nom||''}`.trim() : 'Utilisateur';
    const ann   = mission.annonces;
    const titre = ann ? `${escHTML(ann.titre)}${ann.localisation ? ' — '+escHTML(ann.localisation) : ''}` : 'Mission';
    const emoji = ann ? catEmoji(ann.categorie) : '✨';
    const dateS = new Date(mission.created_at).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const s     = statutInfo(mission.statut);
    const roleLabel = role === 'prestataire' ? 'Client' : 'Prestataire';
    const roleBadge = role === 'prestataire'
      ? '<span style="font-size:0.7rem;background:rgba(240,165,0,0.12);color:#B07800;padding:0.15rem 0.6rem;border-radius:50px;font-weight:600;margin-left:0.4rem;">Prestataire</span>'
      : '<span style="font-size:0.7rem;background:rgba(204,10,43,0.08);color:var(--rouge);padding:0.15rem 0.6rem;border-radius:50px;font-weight:600;margin-left:0.4rem;">Client</span>';

    let footer = '';
    if (mission.statut === 'en_cours') {
      const btnAction = role === 'prestataire'
        ? `<button class="btn-action btn-rouge" onclick="signalerTerminee('${mission.id}','${mission.client_id}','${escHTML(other?.prenom||'')}')">✅ Signaler terminée</button>`
        : `<a href="apijob-evaluation.html?mission=${mission.id}" class="btn-action btn-rouge">⭐ Laisser un avis</a>`;
      footer = `
        <div class="mission-footer-left">📍 ${escHTML(ann?.localisation||'')}</div>
        <div class="mission-actions">
          <a href="apijob-messagerie.html?mission=${mission.id}" class="btn-action btn-outline">💬 Message</a>
          ${btnAction}
        </div>`;
    } else if (mission.statut === 'en_attente_cloture') {
      const btnAction = role === 'client'
        ? `<a href="apijob-evaluation.html?mission=${mission.id}" class="btn-action btn-rouge">⭐ Laisser un avis</a>`
        : `<span class="btn-action btn-gris">⏳ En attente de l'avis client</span>`;
      footer = `
        <div class="mission-footer-left">📍 ${escHTML(ann?.localisation||'')}</div>
        <div class="mission-actions">${btnAction}</div>`;
    } else if (mission.statut === 'en_attente') {
      footer = `
        <div class="mission-footer-left">📍 ${escHTML(ann?.localisation||'')} · En attente de confirmation</div>
        <div class="mission-actions">
          <a href="apijob-messagerie.html?mission=${mission.id}" class="btn-action btn-outline">💬 Voir la proposition</a>
        </div>`;
    } else if (mission.statut === 'terminee') {
      const evalInfo = mission.eval_recu;
      let footLeft = '';
      if (role === 'prestataire') {
        footLeft = evalInfo
          ? `⭐ Avis reçu : ${evalInfo.note_globale}/5${evalInfo.commentaire ? ' — &ldquo;'+escHTML(evalInfo.commentaire.slice(0,60))+'…&rdquo;' : ''}`
          : 'Aucun avis laissé';
      } else {
        footLeft = evalInfo
          ? `✅ Avis publié : ${evalInfo.note_globale}/5`
          : `💬 <a href="apijob-evaluation.html?mission=${mission.id}" style="color:var(--rouge)">Laisser un avis</a>`;
      }
      footer = `<div class="mission-footer-left">${footLeft}</div><div class="mission-actions"></div>`;
    } else {
      footer = `<div class="mission-footer-left">Mission annulée</div><div class="mission-actions"></div>`;
    }

    const div = document.createElement('div');
    div.className = `mission-card ${s.css}`;
    div.dataset.statut = s.css;
    div.innerHTML = `
      <div class="mission-top">
        <div class="mission-emoji">${emoji}</div>
        <div class="mission-content">
          <div class="mission-title">${titre}${roleBadge}</div>
          <div class="mission-interlocuteur">
            <div class="avatar-xs">${init}</div>
            ${roleLabel} : ${escHTML(nom)}
          </div>
          <div class="mission-date">📅 ${dateS}</div>
        </div>
        <span class="mission-badge ${s.badge}">${s.label}</span>
      </div>
      <div class="mission-footer">${footer}</div>`;
    return div;
  }

  function renderList(missions) {
    const el = document.getElementById('missions-list');
    el.innerHTML = '';
    const filtered = currentFiltre === 'toutes'
      ? missions
      : missions.filter(m => statutInfo(m.statut).css === currentFiltre);
    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">Aucune mission</div>
          <div class="empty-sub">Vos missions apparaîtront ici une fois une proposition acceptée.</div>
        </div>`;
      return;
    }
    filtered.forEach(m => el.appendChild(buildCard(m)));
  }

  async function chargerStats() {
    const uid = currentUser.id;
    const [{ count: enCours }, { count: terminee }, { data: evals }] = await Promise.all([
      db.from('missions').select('*',{count:'exact',head:true})
        .or(`prestataire_id.eq.${uid},client_id.eq.${uid}`)
        .in('statut',['en_cours','en_attente_cloture']),
      db.from('missions').select('*',{count:'exact',head:true})
        .or(`prestataire_id.eq.${uid},client_id.eq.${uid}`)
        .eq('statut','terminee'),
      db.from('evaluations').select('note_globale').eq('cible_id', uid)
    ]);
    const avg = evals?.length ? (evals.reduce((s,e)=>s+e.note_globale,0)/evals.length).toFixed(1)+'★' : '—';
    const nums = document.querySelectorAll('#stats-row .stat-num');
    if (nums[0]) nums[0].textContent = enCours || 0;
    if (nums[1]) nums[1].textContent = terminee || 0;
    if (nums[2]) nums[2].textContent = avg;
  }

  (async () => {
    currentUser = await requireAuth();
    if (!currentUser) return;

    const [{ data: mPresta }, { data: mClient }] = await Promise.all([
      db.from('missions')
        .select('*, annonces(titre,categorie,localisation), client:profiles!client_id(prenom,nom), eval_recu:evaluations!mission_id(note_globale,commentaire,auteur_id)')
        .eq('prestataire_id', currentUser.id)
        .order('created_at', { ascending: false }),
      db.from('missions')
        .select('*, annonces(titre,categorie,localisation), prestataire:profiles!prestataire_id(prenom,nom), eval_recu:evaluations!mission_id(note_globale,commentaire,auteur_id)')
        .eq('client_id', currentUser.id)
        .order('created_at', { ascending: false })
    ]);

    const tagEval = (missions, role) => (missions||[]).map(m => ({
      ...m,
      _role: role,
      eval_recu: Array.isArray(m.eval_recu)
        ? m.eval_recu.find(e => e.auteur_id === (role === 'prestataire' ? m.client_id : m.prestataire_id))
        : null
    }));

    allData = [
      ...tagEval(mPresta, 'prestataire'),
      ...tagEval(mClient, 'client')
    ].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    renderList(allData);
    await chargerStats();
  })();
</script>

</body>
</html>
